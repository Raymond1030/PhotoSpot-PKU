<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PhotoSpot PKU — 北京大学摄影点位地图</title>
    <meta name="description" content="探索北京大学最佳摄影点位，发现未名湖、博雅塔、西门等经典拍摄机位。">

    <!-- Google Analytics -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-CYCC6FG3QS"></script>
    <script>
        window.dataLayer = window.dataLayer || [];
        function gtag(){dataLayer.push(arguments);}
        gtag('js', new Date());
        gtag('config', 'G-CYCC6FG3QS');
    </script>

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Noto+Sans+SC:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <!-- Mapbox GL JS -->
    <link href="https://api.mapbox.com/mapbox-gl-js/v3.3.0/mapbox-gl.css" rel="stylesheet">
    <script src="https://api.mapbox.com/mapbox-gl-js/v3.3.0/mapbox-gl.js"></script>

    <!-- App Styles -->
    <link rel="stylesheet" href="css/style.css?v=10">
</head>

<body>
    <!-- Map Container -->
    <div id="map"></div>

    <!-- Brand Badge (top-left) -->
    <div id="brand-badge">
        <img src="assets/pku-logo.png" alt="北京大学" class="brand-logo">
        <div>
            <div class="brand-title">PhotoSpot PKU</div>
            <div class="brand-subtitle">北京大学摄影点位地图</div>
        </div>
    </div>

    <!-- Back Button (top-left, below brand) -->
    <button id="back-btn" aria-label="返回">
        <span class="back-arrow">←</span>
        <div class="back-info">
            <div class="back-name"></div>
            <div class="back-meta"></div>
        </div>
    </button>

    <!-- Style Switcher (top-right) -->
    <div id="style-switcher">
        <button class="style-btn active" data-style="dark" title="暗色地图">🌙</button>
        <button class="style-btn" data-style="streets" title="街道地图">🏢</button>
        <button class="style-btn" data-style="satellite" title="卫星地图">🛰️</button>
    </div>

    <!-- Level 1: Area List Panel (sidebar desktop / drawer mobile) -->
    <div id="area-panel">
        <div class="panel-handle">
            <div class="handle-bar"></div>
        </div>
        <div class="area-panel-header">
            <img src="assets/pku-logo.png" alt="北京大学" class="panel-logo">
            <div>
                <div class="area-panel-title">PhotoSpot PKU</div>
                <div class="area-panel-subtitle">北京大学摄影点位地图</div>
            </div>
            <button id="route-entry-btn" class="route-plan-entry-btn" aria-label="路线规划">🗺️ 路线</button>
        </div>
        <div class="search-bar">
            <span class="search-icon">🔍</span>
            <input type="text" id="search-input" class="search-input" placeholder="搜索区域或机位..." autocomplete="off">
            <button id="search-clear" class="search-clear hidden" aria-label="清除搜索">✕</button>
        </div>
        <div class="category-filter" id="category-filter">
            <button class="filter-pill active" data-category="all">全部</button>
            <button class="filter-pill" data-category="风光">🏔️ 风光</button>
            <button class="filter-pill" data-category="人像">🧑 人像</button>
        </div>
        <div class="area-panel-content" id="areas-container"></div>
    </div>

    <!-- Level 2/3: Bottom Panel -->
    <div id="bottom-panel" class="panel-hidden">
        <div class="panel-handle">
            <div class="handle-bar"></div>
        </div>

        <!-- Level 2: Spot Cards -->
        <div id="spot-cards" class="panel-section active">
            <div class="spot-cards-header">
                <div class="spot-cards-header-left">
                    <div class="spot-cards-title" id="spot-cards-title"></div>
                    <div class="spot-cards-count" id="spot-cards-count"></div>
                </div>
                <button id="share-btn" class="share-btn" aria-label="分享" title="分享链接">🔗 分享</button>
            </div>
            <div class="category-filter spot-filter" id="spot-category-filter">
                <button class="filter-pill active" data-category="all">全部</button>
                <button class="filter-pill" data-category="风光">🏔️ 风光</button>
                <button class="filter-pill" data-category="人像">🧑 人像</button>
            </div>
            <div class="cards-scroll" id="cards-container"></div>
        </div>

        <!-- Level 3: Photo Detail -->
        <div id="photo-detail" class="panel-section">
            <div class="photo-detail-desc" id="photo-desc"></div>
            <div class="photo-strip" id="photo-strip"></div>
            <div class="photo-dots" id="photo-dots"></div>
        </div>

        <!-- Level 4: Route Planning -->
        <div id="route-plan" class="panel-section">
            <div class="route-plan-header">
                <div class="route-plan-header-left">
                    <div class="route-plan-title">路线规划</div>
                    <div class="route-plan-count" id="route-plan-count"></div>
                </div>
                <button id="route-clear-btn" class="route-clear-btn" aria-label="清空路线">清空</button>
            </div>
            <div class="route-start-indicator" id="route-start-indicator">
                <span class="route-start-icon">📍</span>
                <span class="route-start-text">起点：第一个景点</span>
            </div>
            <div class="route-waypoint-list" id="route-waypoint-list">
                <div class="route-empty-hint">请添加至少2个景点</div>
            </div>
            <div class="route-actions">
                <button id="route-add-btn" class="route-action-btn">+ 添加景点</button>
                <button id="route-sort-btn" class="route-action-btn route-sort-btn">⚡ 智能排序</button>
            </div>
            <div class="route-summary hidden" id="route-summary">
                <div class="route-summary-info">
                    <span id="route-summary-distance"></span>
                    <span class="route-sep">·</span>
                    <span id="route-summary-duration"></span>
                    <span class="route-sep">·</span>
                    <span id="route-summary-spots"></span>
                </div>
                <div class="route-summary-actions">
                    <button id="route-view-btn" class="route-primary-btn">查看路线</button>
                    <button id="route-share-btn-route" class="route-share-btn" aria-label="分享路线">分享</button>
                </div>
            </div>
        </div>

        <!-- Spot Picker Overlay -->
        <div id="spot-picker" class="spot-picker hidden">
            <div class="spot-picker-header">
                <button id="spot-picker-close" class="spot-picker-close" aria-label="关闭">✕</button>
                <div class="spot-picker-title">添加景点</div>
            </div>
            <div class="spot-picker-search">
                <span class="search-icon">🔍</span>
                <input type="text" id="spot-picker-input" class="search-input" placeholder="搜索景点..." autocomplete="off">
            </div>
            <div class="spot-picker-list" id="spot-picker-list"></div>
        </div>
    </div>

    <!-- Route Share Modal -->
    <div id="route-share-modal" class="route-share-modal hidden">
        <div class="route-share-modal-content">
            <div class="route-share-modal-title">分享路线</div>
            <button id="route-share-link" class="route-share-option">🔗 复制链接</button>
            <button id="route-share-image" class="route-share-option">📸 分享图片</button>
            <button id="route-share-cancel" class="route-share-cancel">取消</button>
        </div>
    </div>

    <!-- Mobile Float Button -->
    <button id="float-btn" class="float-btn" aria-label="切换面板">
        <span class="float-btn-icon" id="float-btn-icon">✕</span>
    </button>

    <!-- Lightbox -->
    <div id="lightbox">
        <div class="lightbox-spot-info">
            <div class="lightbox-spot-name" id="lightbox-spot-name"></div>
            <div class="lightbox-spot-area" id="lightbox-spot-area"></div>
        </div>
        <button class="lightbox-close" id="lightbox-close" aria-label="关闭">✕</button>
        <button class="lightbox-nav lightbox-nav-prev" id="lightbox-prev" aria-label="上一张">‹</button>
        <img class="lightbox-img" id="lightbox-img" src="" alt="照片预览">
        <button class="lightbox-nav lightbox-nav-next" id="lightbox-next" aria-label="下一张">›</button>
        <div class="lightbox-exif" id="lightbox-exif"></div>
    </div>

    <!-- Toast 通知 -->
    <div id="toast" class="toast"></div>

    <!-- 路线信息 -->
    <div id="route-info" class="route-info">
        <span id="route-distance"></span>
        <span class="route-sep">·</span>
        <span id="route-duration"></span>
    </div>

    <!-- Loading Overlay -->
    <div id="loading-overlay">
        <div class="loading-spinner">
            <div class="spinner-ring"></div>
            <p>加载地图中...</p>
        </div>
    </div>

    <!-- Config (Mapbox Token) -->
    <script src="js/config.js"></script>
    <!-- Main Script -->
    <script src="js/app.js?v=10"></script>
</body>

</html>
